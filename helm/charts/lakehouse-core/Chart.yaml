apiVersion: v2
name: lakehouse-core
description: |
  Umbrella Helm chart for the Open Lakehouse Platform core components.
  Includes: Trino, Trino Gateway, Apache Polaris, Apache Ranger, OpenBao,
  Keycloak, MinIO, OpenMetadata, Apache Airflow, PostgreSQL, Docling,
  cert-manager integration, and External Secrets Operator.
type: application
version: 1.0.0
appVersion: "2026.3"
icon: https://raw.githubusercontent.com/erramaline/open-lakehouse-platform/main/docs/assets/logo-data-lakehouse.png

keywords:
  - lakehouse
  - trino
  - iceberg
  - polaris
  - ranger
  - data-platform

maintainers:
  - name: Platform Team
    email: platform@lakehouse.local

# All components are implemented as inline templates within this chart.
# No external Helm sub-chart dependencies are required.
# Components are toggled via values flags (e.g., trino.enabled, polaris.enabled).
