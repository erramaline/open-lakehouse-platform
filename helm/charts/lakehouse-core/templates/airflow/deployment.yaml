{{- if .Values.airflow.enabled }}
---
# Airflow ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config
  namespace: lakehouse-ingest
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
data:
  airflow.cfg: |
    [core]
    executor = CeleryExecutor
    sql_alchemy_conn = postgresql://$(AIRFLOW_DB_USER):$(AIRFLOW_DB_PASSWORD)@postgresql.lakehouse-system.svc.cluster.local:5432/airflow
    fernet_key = $(AIRFLOW_FERNET_KEY)
    load_examples = False
    [webserver]
    expose_config = False
    authenticate = True
    auth_backend = airflow.providers.fab.auth_manager.fab_auth_manager
    [celery]
    broker_url = redis://$(AIRFLOW_REDIS_PASSWORD)@redis.lakehouse-ingest.svc.cluster.local:6379/0
    result_backend = db+postgresql://$(AIRFLOW_DB_USER):$(AIRFLOW_DB_PASSWORD)@postgresql.lakehouse-system.svc.cluster.local:5432/airflow
    [logging]
    base_log_folder = /opt/airflow/logs
    remote_logging = True
    remote_log_conn_id = aws_s3_log
    remote_base_log_folder = s3://{{ .Values.global.lakehouseBucket }}/airflow-logs
    [api]
    auth_backends = airflow.api.auth.backend.basic_auth
---
# Airflow Webserver
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: lakehouse-ingest
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
    app.kubernetes.io/name: airflow-webserver
spec:
  replicas: {{ .Values.airflow.webserver.replicas }}
  minReadySeconds: 10
  strategy:
    {{- include "lakehouse-core.rollingUpdateStrategy" . | nindent 4 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: airflow-webserver
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airflow-webserver
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/airflow/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: airflow
      securityContext:
        {{- include "lakehouse-core.podSecurityContext" . | nindent 8 }}
      containers:
        - name: airflow-webserver
          image: "{{ .Values.airflow.image.repository }}:{{ .Values.airflow.image.tag }}"
          imagePullPolicy: {{ .Values.airflow.image.pullPolicy }}
          securityContext:
            {{- include "lakehouse-core.containerSecurityContext" . | nindent 12 }}
          command: ["airflow", "webserver"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: AIRFLOW_FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.auth.fernetExistingSecret }}
                  key: fernet-key
            - name: AIRFLOW__WEBSERVER__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.auth.webserverExistingSecret }}
                  key: webserver-secret-key
            - name: AIRFLOW_DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.auth.dbExistingSecret }}
                  key: username
            - name: AIRFLOW_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.auth.dbExistingSecret }}
                  key: password
            - name: AIRFLOW_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.auth.redisExistingSecret }}
                  key: password
            - name: AIRFLOW__CORE__FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.auth.fernetExistingSecret }}
                  key: fernet-key
          resources:
            {{- toYaml .Values.airflow.webserver.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /opt/airflow/airflow.cfg
              subPath: airflow.cfg
            - name: logs
              mountPath: /opt/airflow/logs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: airflow-config
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
# Airflow Scheduler
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: lakehouse-ingest
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
    app.kubernetes.io/name: airflow-scheduler
spec:
  replicas: {{ .Values.airflow.scheduler.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: airflow-scheduler
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airflow-scheduler
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: airflow
      securityContext:
        {{- include "lakehouse-core.podSecurityContext" . | nindent 8 }}
      containers:
        - name: airflow-scheduler
          image: "{{ .Values.airflow.image.repository }}:{{ .Values.airflow.image.tag }}"
          imagePullPolicy: {{ .Values.airflow.image.pullPolicy }}
          securityContext:
            {{- include "lakehouse-core.containerSecurityContext" . | nindent 12 }}
          command: ["airflow", "scheduler"]
          env:
            - name: AIRFLOW_FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.auth.fernetExistingSecret }}
                  key: fernet-key
            - name: AIRFLOW_DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.auth.dbExistingSecret }}
                  key: username
            - name: AIRFLOW_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.auth.dbExistingSecret }}
                  key: password
            - name: AIRFLOW_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.auth.redisExistingSecret }}
                  key: password
          resources:
            {{- toYaml .Values.airflow.scheduler.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - airflow
                - jobs
                - check
                - --local
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 5
          volumeMounts:
            - name: config
              mountPath: /opt/airflow/airflow.cfg
              subPath: airflow.cfg
            - name: dags
              mountPath: /opt/airflow/dags
            - name: logs
              mountPath: /opt/airflow/logs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: airflow-config
        - name: dags
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
# Airflow Worker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-worker
  namespace: lakehouse-ingest
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
    app.kubernetes.io/name: airflow-worker
spec:
  replicas: {{ .Values.airflow.workers.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: airflow-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airflow-worker
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: airflow
      securityContext:
        {{- include "lakehouse-core.podSecurityContext" . | nindent 8 }}
      containers:
        - name: airflow-worker
          image: "{{ .Values.airflow.image.repository }}:{{ .Values.airflow.image.tag }}"
          imagePullPolicy: {{ .Values.airflow.image.pullPolicy }}
          securityContext:
            {{- include "lakehouse-core.containerSecurityContext" . | nindent 12 }}
          command: ["airflow", "celery", "worker"]
          env:
            - name: AIRFLOW_FERNET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.auth.fernetExistingSecret }}
                  key: fernet-key
            - name: AIRFLOW_DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.auth.dbExistingSecret }}
                  key: username
            - name: AIRFLOW_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.auth.dbExistingSecret }}
                  key: password
            - name: AIRFLOW_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.airflow.auth.redisExistingSecret }}
                  key: password
          resources:
            {{- toYaml .Values.airflow.workers.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - airflow
                - celery
                - inspect
                - ping
                - -d
                - celery@$(hostname)
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 5
          volumeMounts:
            - name: config
              mountPath: /opt/airflow/airflow.cfg
              subPath: airflow.cfg
            - name: dags
              mountPath: /opt/airflow/dags
            - name: logs
              mountPath: /opt/airflow/logs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: airflow-config
        - name: dags
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
# Airflow Webserver Service + Ingress
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: lakehouse-ingest
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
    app.kubernetes.io/name: airflow-webserver
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app.kubernetes.io/name: airflow-webserver
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- if .Values.airflow.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: airflow
  namespace: lakehouse-ingest
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.global.certIssuer }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: {{ .Values.airflow.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.airflow.ingress.host }}
      secretName: airflow-tls-cert
  rules:
    - host: {{ .Values.airflow.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: airflow-webserver
                port:
                  name: http
{{- end }}
---
# Worker HPA
{{- if .Values.airflow.workers.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: airflow-worker
  namespace: lakehouse-ingest
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: airflow-worker
  minReplicas: {{ .Values.airflow.workers.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.airflow.workers.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.airflow.workers.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
