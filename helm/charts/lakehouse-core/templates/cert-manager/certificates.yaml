{{- if .Values.certManager.enabled }}
---
# ClusterIssuer — Let's Encrypt production
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ .Values.certManager.acme.email }}
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: {{ .Values.global.ingressClass }}
---
# ClusterIssuer — Let's Encrypt staging (pour les tests)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: {{ .Values.certManager.acme.email }}
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: {{ .Values.global.ingressClass }}
---
{{- if .Values.certManager.internalCA.enabled }}
# ClusterIssuer — CA interne (self-hosted via cert-manager)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: internal-ca
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
spec:
  ca:
    secretName: {{ .Values.certManager.internalCA.secretName }}
{{- end }}
---
# Certificat Trino
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: trino-tls
  namespace: lakehouse-data
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
spec:
  secretName: trino-tls-cert
  issuerRef:
    name: {{ .Values.global.certIssuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.trino.ingress.host }}
    - trino-coordinator.lakehouse-data.svc.cluster.local
  duration: 2160h
  renewBefore: 360h
---
