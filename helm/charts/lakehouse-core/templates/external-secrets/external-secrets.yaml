{{- if .Values.externalSecrets.enabled }}
---
# ClusterSecretStore — pointe vers OpenBao via authentification Kubernetes
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.externalSecrets.secretStoreName }}
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
spec:
  provider:
    vault:
      server: {{ .Values.global.openbaoAddress }}
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: {{ .Values.externalSecrets.openbaoRole }}
          serviceAccountRef:
            name: external-secrets
            namespace: lakehouse-system
---
# ── PostgreSQL root ──────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgresql-root-secret
  namespace: lakehouse-system
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: postgresql-root-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/postgresql/root
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/postgresql/root
        property: password
---
# ── Per-service DB secrets ───────────────────────────────────────────────────
{{- range list "keycloak" "polaris" "nessie" "ranger" "airflow" "openmetadata" }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ . }}-db-secret
  namespace: lakehouse-system
  labels:
    {{- include "lakehouse-core.labels" $ | nindent 4 }}
spec:
  refreshInterval: {{ $.Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ $.Values.externalSecrets.secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ . }}-db-secret
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/db/postgres/{{ . }}
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/db/postgres/{{ . }}
        property: password
---
{{- end }}
