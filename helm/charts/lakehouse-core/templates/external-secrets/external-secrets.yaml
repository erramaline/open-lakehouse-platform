{{- $oidcNamespaces := dict "trino" "lakehouse-data" "airflow" "lakehouse-ingest" "openmetadata" "lakehouse-ingest" "grafana" "lakehouse-obs" "minio" "lakehouse-storage" }}
{{- range $client, $ns := $oidcNamespaces }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $client }}-oidc-secret
  namespace: {{ $ns }}
  labels:
    {{- include "lakehouse-core.labels" $ | nindent 4 }}
spec:
  refreshInterval: {{ $.Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ $.Values.externalSecrets.secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ $client }}-oidc-secret
    creationPolicy: Owner
  data:
    - secretKey: clientId
      remoteRef:
        key: secret/data/identity/keycloak/clients/{{ $client }}
        property: client_id
    - secretKey: clientSecret
      remoteRef:
        key: secret/data/identity/keycloak/clients/{{ $client }}
        property: client_secret
---
{{- end }}
