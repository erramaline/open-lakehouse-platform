{{- if .Values.minio.enabled }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: lakehouse-storage
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
    app.kubernetes.io/name: minio
spec:
  serviceName: minio
  replicas: {{ .Values.minio.replicas }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: minio
      securityContext:
        {{- include "lakehouse-core.podSecurityContext" . | nindent 8 }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: minio
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          imagePullPolicy: {{ .Values.minio.image.pullPolicy }}
          securityContext:
            {{- include "lakehouse-core.containerSecurityContext" . | nindent 12 }}
          command:
            - minio
            - server
            - "http://minio-{0...{{ sub .Values.minio.replicas 1 }}}.minio.lakehouse-storage.svc.cluster.local/data{1...{{ .Values.minio.disksPerPod }}}"
            - --console-address=:9001
          ports:
            - name: api
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.auth.existingSecret }}
                  key: {{ .Values.minio.auth.rootUserKey }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.auth.existingSecret }}
                  key: {{ .Values.minio.auth.rootPasswordKey }}
            - name: MINIO_IDENTITY_OPENID_CONFIG_URL
              value: "{{ .Values.global.keycloakUrl }}/realms/lakehouse/.well-known/openid-configuration"
            - name: MINIO_IDENTITY_OPENID_CLIENT_ID
              value: "{{ .Values.minio.oidc.clientId }}"
            - name: MINIO_IDENTITY_OPENID_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.oidc.existingSecret }}
                  key: {{ .Values.minio.oidc.clientSecretKey }}
            - name: MINIO_PROMETHEUS_URL
              value: "http://prometheus.lakehouse-obs.svc.cluster.local:9090"
            - name: MINIO_PROMETHEUS_AUTH_TYPE
              value: "public"
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            {{- range $i := until (int .Values.minio.disksPerPod) }}
            - name: data{{ add $i 1 }}
              mountPath: /data{{ add $i 1 }}
            {{- end }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    {{- range $i := until (int .Values.minio.disksPerPod) }}
    - metadata:
        name: data{{ add $i 1 }}
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ $.Values.global.storageClass }}
        resources:
          requests:
            storage: {{ $.Values.minio.storage.size }}
    {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: lakehouse-storage
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
    app.kubernetes.io/name: minio
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
  selector:
    app.kubernetes.io/name: minio
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: Service
metadata:
  name: minio-api
  namespace: lakehouse-storage
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
    app.kubernetes.io/name: minio
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9000"
    prometheus.io/path: "/minio/v2/metrics/cluster"
spec:
  type: ClusterIP
  ports:
    - name: api
      port: 9000
      targetPort: api
  selector:
    app.kubernetes.io/name: minio
    app.kubernetes.io/instance: {{ .Release.Name }}
---
{{- if .Values.minio.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-console
  namespace: lakehouse-storage
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.global.certIssuer }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: {{ .Values.minio.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.minio.ingress.consoleHost }}
      secretName: minio-console-tls
  rules:
    - host: {{ .Values.minio.ingress.consoleHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio-api
                port:
                  name: console
{{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: minio
  namespace: lakehouse-storage
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.minio.pdb.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
