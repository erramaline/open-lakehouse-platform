{{- if .Values.openbao.enabled }}
---
# OpenBao ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-config
  namespace: lakehouse-system
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
data:
  config.hcl: |
    ui = true
    log_level = "info"

    storage "raft" {
      path    = "/openbao/data"
      node_id = "OPENBAO_NODE_ID"  # overridden by init container using hostname
      retry_join {
        leader_api_addr = "https://openbao-0.openbao.lakehouse-system.svc.cluster.local:8200"
      }
      retry_join {
        leader_api_addr = "https://openbao-1.openbao.lakehouse-system.svc.cluster.local:8200"
      }
      retry_join {
        leader_api_addr = "https://openbao-2.openbao.lakehouse-system.svc.cluster.local:8200"
      }
    }

    listener "tcp" {
      address            = "0.0.0.0:8200"
      cluster_address    = "0.0.0.0:8201"
      {{- if .Values.global.tls.enabled }}
      tls_cert_file      = "/tls/tls.crt"
      tls_key_file       = "/tls/tls.key"
      tls_min_version    = "tls13"
      {{- else }}
      tls_disable        = true
      {{- end }}
    }

    api_addr     = "https://$(HOSTNAME).openbao.lakehouse-system.svc.cluster.local:8200"
    cluster_addr = "https://$(HOSTNAME).openbao.lakehouse-system.svc.cluster.local:8201"

    default_lease_ttl = "{{ .Values.openbao.defaultLeaseTtl }}"
    max_lease_ttl     = "{{ .Values.openbao.maxLeaseTtl }}"

    telemetry {
      disable_hostname          = true
      prometheus_retention_time = "60s"
    }
    {{- if .Values.openbao.autoUnseal.enabled }}

    seal "awskms" {
      region     = "{{ .Values.openbao.autoUnseal.awsRegion }}"
      kms_key_id = "{{ .Values.openbao.autoUnseal.kmsKeyId }}"
    }
    {{- end }}
---
# OpenBao StatefulSet — 3-node Raft cluster
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openbao
  namespace: lakehouse-system
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
    app.kubernetes.io/name: openbao
spec:
  serviceName: openbao
  replicas: {{ .Values.openbao.replicas }}
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: openbao
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openbao
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/openbao/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: openbao
      securityContext:
        {{- include "lakehouse-core.podSecurityContext" . | nindent 8 }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: openbao
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: openbao
      initContainers:
        - name: config-init
          image: busybox:1.36
          securityContext:
            {{- include "lakehouse-core.containerSecurityContext" . | nindent 12 }}
          command:
            - sh
            - -c
            - |
              sed "s/OPENBAO_NODE_ID/$HOSTNAME/" /etc/openbao/config.hcl > /openbao/config/config.hcl
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: config-template
              mountPath: /etc/openbao
              readOnly: true
            - name: config
              mountPath: /openbao/config
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: openbao
          image: "{{ .Values.openbao.image.repository }}:{{ .Values.openbao.image.tag }}"
          imagePullPolicy: {{ .Values.openbao.image.pullPolicy }}
          securityContext:
            {{- include "lakehouse-core.containerSecurityContext" . | nindent 12 }}
          command:
            - bao
            - server
            - -config=/openbao/config/config.hcl
          ports:
            - name: api
              containerPort: 8200
              protocol: TCP
            - name: cluster
              containerPort: 8201
              protocol: TCP
          env:
            - name: SKIP_CHOWN
              value: "true"
            - name: SKIP_SETCAP
              value: "true"
            {{- if .Values.openbao.autoUnseal.enabled }}
            - name: AWS_REGION
              value: "{{ .Values.openbao.autoUnseal.awsRegion }}"
            {{- end }}
          resources:
            {{- toYaml .Values.openbao.resources | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - bao
                - status
                - -format=json
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&perfstandbyok=true
              port: api
              scheme: {{ if .Values.global.tls.enabled }}HTTPS{{ else }}HTTP{{ end }}
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          volumeMounts:
            {{- include "lakehouse-core.tlsVolumeMount" . | nindent 12 }}
            - name: config
              mountPath: /openbao/config
            - name: data
              mountPath: /openbao/data
      volumes:
        {{- include "lakehouse-core.tlsVolume" (dict "service" "openbao" "context" .) | nindent 8 }}
        - name: config-template
          configMap:
            name: openbao-config
        - name: config
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.global.storageClass }}
        resources:
          requests:
            storage: {{ .Values.openbao.storage.size }}
---
# OpenBao Services
apiVersion: v1
kind: Service
metadata:
  name: openbao
  namespace: lakehouse-system
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
    app.kubernetes.io/name: openbao
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: api
      port: 8200
      targetPort: api
    - name: cluster
      port: 8201
      targetPort: cluster
  selector:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: v1
kind: Service
metadata:
  name: openbao-active
  namespace: lakehouse-system
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
    app.kubernetes.io/name: openbao
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8200"
    prometheus.io/path: "/v1/sys/metrics"
spec:
  type: ClusterIP
  ports:
    - name: api
      port: 8200
      targetPort: api
  selector:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/instance: {{ .Release.Name }}
    openbao-active: "true"
---
# OpenBao PDB — keep quorum
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: openbao
  namespace: lakehouse-system
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: openbao
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
