{{- if .Values.polaris.enabled }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: polaris
  namespace: lakehouse-data
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
    app.kubernetes.io/name: polaris
spec:
  serviceName: polaris
  replicas: {{ .Values.polaris.replicas }}
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: polaris
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: polaris
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: polaris
      securityContext:
        {{- include "lakehouse-core.podSecurityContext" . | nindent 8 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: polaris
                topologyKey: kubernetes.io/hostname
      containers:
        - name: polaris
          image: "{{ .Values.polaris.image.repository }}:{{ .Values.polaris.image.tag }}"
          imagePullPolicy: {{ .Values.polaris.image.pullPolicy }}
          securityContext:
            {{- include "lakehouse-core.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8181
              protocol: TCP
            - name: management
              containerPort: 8182
              protocol: TCP
          env:
            - name: POLARIS_PERSISTENCE_TYPE
              value: relational-jdbc
            - name: POLARIS_DB_URL
              value: "jdbc:postgresql://postgresql.lakehouse-system.svc.cluster.local:5432/{{ .Values.polaris.database.name }}"
            - name: POLARIS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.polaris.auth.existingSecret }}
                  key: username
            - name: POLARIS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.polaris.auth.existingSecret }}
                  key: password
            - name: POLARIS_REALM
              value: "{{ .Values.polaris.realm }}"
            - name: POLARIS_STORAGE_S3_ENDPOINT
              value: "{{ .Values.global.minioEndpoint }}"
            - name: POLARIS_STORAGE_S3_BUCKET
              value: "{{ .Values.global.lakehouseBucket }}"
            - name: AWS_REGION
              value: "us-east-1"
          resources:
            {{- toYaml .Values.polaris.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: management
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: polaris
  namespace: lakehouse-data
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
    app.kubernetes.io/name: polaris
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8182"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8181
      targetPort: http
    - name: management
      port: 8182
      targetPort: management
  selector:
    app.kubernetes.io/name: polaris
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: polaris
  namespace: lakehouse-data
  labels:
    {{- include "lakehouse-core.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: polaris
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
