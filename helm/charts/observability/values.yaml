global:
  # Classe de stockage K8s (ex: standard, fast-ssd, gp3)
  storageClass: standard
  # ImagePullSecrets partagés
  imagePullSecrets: []
  # Domaine de base des ingress
  domain: example.com
  # ClusterIssuer cert-manager à utiliser
  certIssuer: letsencrypt-prod
  # URL Keycloak pour OIDC Grafana
  keycloakUrl: https://keycloak.example.com
  ingressClass: nginx

# ── Prometheus ───────────────────────────────────────────────────────────────
prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: v2.50.1
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2
      memory: 4Gi
  storage:
    size: 100Gi
  retention: "30d"
  # Scrape interval global
  scrapeInterval: 30s
  evaluationInterval: 30s
  # Namespaces cibles pour la découverte de services
  targetNamespaces:
    - lakehouse-data
    - lakehouse-system
    - lakehouse-storage
    - lakehouse-ingest
    - lakehouse-obs
  ingress:
    enabled: false
    className: nginx
    host: prometheus.example.com

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: 10.4.1
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 512Mi
  storage:
    size: 10Gi
  auth:
    # Secret créé par ESO depuis secret/data/observability/grafana/admin
    existingSecret: grafana-admin-secret
    adminUserKey: adminUser
    adminPasswordKey: adminPassword
  oidc:
    enabled: true
    # Secret OIDC créé par ESO depuis secret/data/identity/keycloak/clients/grafana
    existingSecret: grafana-oidc-secret
    clientIdKey: clientId
    clientSecretKey: clientSecret
    groups:
      adminGroup: "/grafana-admin"
      editorGroup: "/grafana-editor"
  ingress:
    enabled: true
    className: nginx
    host: grafana.example.com
  # Datasources préconfigurées
  datasources:
    prometheus:
      url: http://prometheus.lakehouse-obs.svc.cluster.local:9090
    loki:
      url: http://loki.lakehouse-obs.svc.cluster.local:3100

# ── Loki ──────────────────────────────────────────────────────────────────────
loki:
  enabled: true
  image:
    repository: grafana/loki
    tag: 2.9.5
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi
  storage:
    size: 50Gi
  # Rétention des logs
  retentionPeriod: 720h  # 30 jours
  # Config S3/MinIO pour le stockage long terme
  s3:
    enabled: false
    endpoint: ""
    bucket: ""
    region: us-east-1

# ── Promtail ──────────────────────────────────────────────────────────────────
promtail:
  enabled: true
  image:
    repository: grafana/promtail
    tag: 2.9.5
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ── Alertmanager ──────────────────────────────────────────────────────────────
alertmanager:
  enabled: true
  image:
    repository: prom/alertmanager
    tag: v0.27.0
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  storage:
    size: 5Gi
  auth:
    # Secret créé par ESO depuis secret/data/observability/alertmanager/webhook
    existingSecret: alertmanager-webhook-secret
    webhookUrlKey: webhookUrl
  # Receivers configurés
  receivers:
    slack:
      enabled: true
      channel: "#alerts-lakehouse"
    pagerduty:
      enabled: false
      serviceKey: ""

# ── ExternalSecrets ───────────────────────────────────────────────────────────
externalSecrets:
  enabled: true
  secretStoreName: openbao-secret-store
  refreshInterval: "1h"
