---
# =============================================================================
# Open Lakehouse Platform — Kubernetes Network Policies
# =============================================================================
# Strategy: default-deny ingress + egress in all namespaces,
# then explicitly allow required paths only (least-privilege).
# =============================================================================

# ── Default-deny ingress+egress: lakehouse-data ──────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: lakehouse-data
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: lakehouse-system
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: lakehouse-storage
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: lakehouse-ingest
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: lakehouse-obs
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]

# =============================================================================
# DNS egress — allow all pods to reach kube-dns (UDP/TCP 53)
# =============================================================================
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: lakehouse-data
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: lakehouse-system
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: lakehouse-storage
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: lakehouse-ingest
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: lakehouse-obs
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

# =============================================================================
# lakehouse-data: Trino ↔ Polaris (8181), Ranger (6080), MinIO (9000/9443)
# =============================================================================
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: trino-to-polaris
  namespace: lakehouse-data
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: trino
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: polaris
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-data
      ports:
        - protocol: TCP
          port: 8181
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: polaris-from-trino
  namespace: lakehouse-data
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: polaris
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: trino
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-data
      ports:
        - protocol: TCP
          port: 8181
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: trino-to-ranger
  namespace: lakehouse-data
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: trino
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ranger
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-data
      ports:
        - protocol: TCP
          port: 6080
        - protocol: TCP
          port: 6182   # Ranger HTTPS
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ranger-from-trino
  namespace: lakehouse-data
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ranger
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: trino
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-data
      ports:
        - protocol: TCP
          port: 6080
        - protocol: TCP
          port: 6182
---
# Trino → MinIO (cross-namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: trino-to-minio
  namespace: lakehouse-data
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: trino
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-storage
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9443
---
# MinIO ← Trino (cross-namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio-from-trino
  namespace: lakehouse-storage
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: minio
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-data
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: trino
      ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9443

# =============================================================================
# lakehouse-system: OpenBao — allow all namespaces to pull secrets (8200)
# =============================================================================
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openbao-from-all-namespaces
  namespace: lakehouse-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: openbao
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - lakehouse-data
                  - lakehouse-storage
                  - lakehouse-ingest
                  - lakehouse-obs
                  - lakehouse-system
      ports:
        - protocol: TCP
          port: 8200
        - protocol: TCP
          port: 8201   # cluster port (Raft)
---
# All namespaces egress → OpenBao
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-to-openbao
  namespace: lakehouse-data
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-system
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: openbao
      ports:
        - protocol: TCP
          port: 8200
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-to-openbao
  namespace: lakehouse-storage
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-system
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: openbao
      ports:
        - protocol: TCP
          port: 8200
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-to-openbao
  namespace: lakehouse-ingest
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-system
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: openbao
      ports:
        - protocol: TCP
          port: 8200
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-to-openbao
  namespace: lakehouse-obs
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-system
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: openbao
      ports:
        - protocol: TCP
          port: 8200

# =============================================================================
# lakehouse-system: Keycloak OIDC — accessible from all namespaces (8080/8443)
# =============================================================================
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: keycloak-from-all-namespaces
  namespace: lakehouse-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - lakehouse-data
                  - lakehouse-storage
                  - lakehouse-ingest
                  - lakehouse-obs
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
---
# All data/ingest/obs pods can reach Keycloak for OIDC
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-to-keycloak
  namespace: lakehouse-data
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-system
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-to-keycloak
  namespace: lakehouse-ingest
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-system
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-to-keycloak
  namespace: lakehouse-obs
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-system
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443

# =============================================================================
# lakehouse-system: PostgreSQL — accessible only from known service pods
# =============================================================================
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgresql-from-services
  namespace: lakehouse-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-system
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [keycloak, pgbouncer]
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-data
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [polaris, nessie, ranger, trino-gateway]
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-ingest
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [airflow, openmetadata]
      ports:
        - protocol: TCP
          port: 5432

# =============================================================================
# lakehouse-obs: Prometheus scrape → all namespaces (port 8080/9090/etc.)
# =============================================================================
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-scrape-ingress
  namespace: lakehouse-data
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-obs
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9091
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-scrape-ingress
  namespace: lakehouse-system
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-obs
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9091
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-scrape-ingress
  namespace: lakehouse-storage
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-obs
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9000   # MinIO metrics endpoint
        - protocol: TCP
          port: 9090
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-scrape-ingress
  namespace: lakehouse-ingest
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-obs
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
---
# Prometheus egress → all namespaces to scrape
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-scrape-egress
  namespace: lakehouse-obs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: In
                values:
                  - lakehouse-data
                  - lakehouse-system
                  - lakehouse-storage
                  - lakehouse-ingest
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9091
---
# Grafana ↔ Prometheus + Loki (same namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-to-prometheus-loki
  namespace: lakehouse-obs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [prometheus, loki]
          namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: lakehouse-obs
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 3100

