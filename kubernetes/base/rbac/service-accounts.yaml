---
# =============================================================================
# RBAC — ServiceAccounts + ClusterRoles for Open Lakehouse Platform
# =============================================================================

# ── Trino ─────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trino
  namespace: lakehouse-data
  labels:
    app.kubernetes.io/name: trino
    app.kubernetes.io/part-of: open-lakehouse-platform
  annotations:
    openbao.org/role: "trino"
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trino
  namespace: lakehouse-data
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
    resourceNames: ["trino-tls", "trino-config"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trino
  namespace: lakehouse-data
subjects:
  - kind: ServiceAccount
    name: trino
    namespace: lakehouse-data
roleRef:
  kind: Role
  name: trino
  apiGroup: rbac.authorization.k8s.io
---

# ── Trino Gateway ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trino-gateway
