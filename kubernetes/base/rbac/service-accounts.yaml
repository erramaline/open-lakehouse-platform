# ── External Secrets Operator ─────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: lakehouse-system
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/part-of: open-lakehouse-platform
  annotations:
    openbao.org/role: "external-secrets"
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-secrets-controller
rules:
  - apiGroups: [""]
    resources: ["secrets", "serviceaccounts", "serviceaccounts/token"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["external-secrets.io"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["generators.external-secrets.io"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-secrets-controller
subjects:
  - kind: ServiceAccount
    name: external-secrets
    namespace: lakehouse-system
roleRef:
  kind: ClusterRole
  name: external-secrets-controller
  apiGroup: rbac.authorization.k8s.io
---

