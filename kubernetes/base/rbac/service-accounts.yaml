# ── Observability stack ───────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: lakehouse-obs
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: open-lakehouse-platform
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-scrape
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: open-lakehouse-platform
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/metrics", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-scrape
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: lakehouse-obs
roleRef:
  kind: ClusterRole
  name: prometheus-scrape
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana
  namespace: lakehouse-obs
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: open-lakehouse-platform
  annotations:
    openbao.org/role: "grafana"
automountServiceAccountToken: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: lakehouse-obs
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/part-of: open-lakehouse-platform
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail-log-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "services", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail-log-reader
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: lakehouse-obs
roleRef:
  kind: ClusterRole
  name: promtail-log-reader
  apiGroup: rbac.authorization.k8s.io
