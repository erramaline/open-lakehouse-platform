---
# kubernetes/overlays/production/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

labels:
  - pairs:
      environment: production
    includeSelectors: false
    includeTemplates: true

patches:
  - path: patches/trino-ha.yaml
    target:
      kind: Deployment
      name: trino-coordinator
  - path: patches/trino-worker-ha.yaml
    target:
      kind: Deployment
      name: trino-worker
  - path: patches/polaris-ha.yaml
    target:
      kind: StatefulSet
      name: polaris
  - path: patches/openbao-ha.yaml
    target:
      kind: StatefulSet
      name: openbao
  - path: patches/minio-ha.yaml
    target:
      kind: StatefulSet
      name: minio
  - path: patches/keycloak-ha.yaml
    target:
      kind: StatefulSet
      name: keycloak
  - path: patches/anti-affinity-openbao.yaml
    target:
      kind: StatefulSet
      name: openbao
  - path: patches/anti-affinity-minio.yaml
    target:
      kind: StatefulSet
      name: minio
  - path: patches/anti-affinity-keycloak.yaml
    target:
      kind: StatefulSet
      name: keycloak
  - path: patches/anti-affinity-polaris.yaml
    target:
      kind: StatefulSet
      name: polaris
  - path: patches/anti-affinity-trino-coordinator.yaml
    target:
      kind: Deployment
      name: trino-coordinator
  - path: patches/anti-affinity-trino-worker.yaml
    target:
      kind: Deployment
      name: trino-worker
  - path: patches/topology-spread.yaml
    target:
      kind: ConfigMap
      name: topology-spread-policy

configMapGenerator:
  - name: environment-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - TRACING_ENABLED=true
