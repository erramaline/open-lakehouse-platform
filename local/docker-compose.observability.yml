# =============================================================================
# docker-compose.observability.yml — Observability stack override / standalone
# =============================================================================
# Usage (standalone — observability only):
#   docker compose -f docker-compose.observability.yml up -d
#
# Usage (overlay on top of main stack — adjust resource limits for prod-like):
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#
# Standalone mode requires an external network named 'lakehouse-net' to exist,
# OR change network mode to a new bridge. For standalone, comment out
# 'external: true' below and uncomment the bridge config.
# =============================================================================

name: lakehouse

networks:
  lakehouse-net:
    external: true    # Expects main docker-compose.yml to have created this network
    # driver: bridge  # Uncomment for standalone mode

volumes:
  prometheus-data: {}
  grafana-data: {}
  loki-data: {}

services:

  prometheus:
    image: prom/prometheus:latest
    hostname: prometheus
    restart: unless-stopped
    networks:
      - lakehouse-net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"   # Extended retention in observability-only mode
      - "--web.enable-remote-write-receiver"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - prometheus-data:/prometheus
      - ./volumes/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./volumes/prometheus/rules:/etc/prometheus/rules:ro
    ports:
      - "9092:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M

  alertmanager:
    image: prom/alertmanager:latest
    hostname: alertmanager
    restart: unless-stopped
    networks:
      - lakehouse-net
    volumes:
      - ./volumes/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    hostname: grafana
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY:?set GRAFANA_SECRET_KEY}
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_USERS_ALLOW_SIGN_UP: "false"
      # In standalone mode: disable OIDC (no Keycloak running)
      GF_AUTH_GENERIC_OAUTH_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./volumes/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./volumes/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  loki:
    image: grafana/loki:latest
    hostname: loki
    restart: unless-stopped
    networks:
      - lakehouse-net
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
      - ./volumes/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  promtail:
    image: grafana/promtail:latest
    hostname: promtail
    restart: unless-stopped
    networks:
      - lakehouse-net
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./volumes/promtail/config.yml:/etc/promtail/config.yml:ro
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9080/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    hostname: otel-collector
    restart: unless-stopped
    networks:
      - lakehouse-net
    command: --config=/etc/otel/otel-collector-config.yaml
    volumes:
      - ./volumes/otel/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "55679:55679"
    environment:
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-disabled}
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:13133/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
