# =============================================================================
# Open Lakehouse Platform — Local Development Docker Compose
# =============================================================================
# Usage:
#   cp local/.env.example local/.env && vim local/.env   # set real secrets
#   make dev-up                                           # start everything
#
# All 33 services on a single bridge network: lakehouse-net
# Dependency order enforced via depends_on + condition: service_healthy
# Resource limits via deploy.resources (Docker Compose v2.24+ / Docker Desktop 4.x)
# =============================================================================

name: lakehouse

# ─── Network ─────────────────────────────────────────────────────────────────
networks:
  lakehouse-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

# ─── Named volumes (persist data across container restarts) ───────────────────
volumes:
  minio-1-data1: {}
  minio-1-data2: {}
  minio-2-data1: {}
  minio-2-data2: {}
  minio-3-data1: {}
  minio-3-data2: {}
  minio-4-data1: {}
  minio-4-data2: {}
  postgresql-data: {}
  openbao-1-data: {}
  openbao-2-data: {}
  openbao-3-data: {}
  solr-data: {}
  elasticsearch-data: {}
  redis-data: {}
  loki-data: {}
  grafana-data: {}
  prometheus-data: {}

# ─── Reusable logging config ──────────────────────────────────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

# ─── MinIO common config (4 nodes share same image + env) ─────────────────────
x-minio-common: &minio-common
  image: quay.io/minio/minio:latest
  restart: unless-stopped
  networks:
    - lakehouse-net
  environment:
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    MINIO_PROMETHEUS_AUTH_TYPE: public
    MINIO_IDENTITY_OPENID_CONFIG_URL: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/.well-known/openid-configuration
    MINIO_IDENTITY_OPENID_CLIENT_ID: minio
    MINIO_IDENTITY_OPENID_CLIENT_SECRET: ${KEYCLOAK_MINIO_CLIENT_SECRET}
    MINIO_IDENTITY_OPENID_CLAIM_NAME: groups
    MINIO_IDENTITY_OPENID_SCOPES: openid,profile,email
  command: >
    server --console-address ':9001'
    http://minio-1/data1 http://minio-1/data2
    http://minio-2/data1 http://minio-2/data2
    http://minio-3/data1 http://minio-3/data2
    http://minio-4/data1 http://minio-4/data2
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 90s
  logging: *default-logging

# ─── Airflow common config (webserver, scheduler, worker share same image) ────
x-airflow-common: &airflow-common
  image: apache/airflow:2.10.4-python3.12
  restart: unless-stopped
  networks:
    - lakehouse-net
  volumes:
    - ./volumes/airflow/airflow.cfg:/opt/airflow/airflow.cfg:ro
    - ../pipelines/airflow/dags:/opt/airflow/dags:ro
  environment:
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@pgbouncer:${PGBOUNCER_PORT:-6432}/${AIRFLOW_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__CELERY__BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@pgbouncer:${PGBOUNCER_PORT:-6432}/${AIRFLOW_DB}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__METRICS__OTEL_ON: "true"
    AIRFLOW__METRICS__OTEL_HOST: otel-collector
    AIRFLOW__METRICS__OTEL_PORT: "4317"
    AIRFLOW__LOGGING__REMOTE_LOGGING: "false"
    # Polaris / MinIO credentials for DAGs
    POLARIS_AIRFLOW_CLIENT_ID: ${POLARIS_AIRFLOW_CLIENT_ID}
    POLARIS_AIRFLOW_CLIENT_SECRET: ${POLARIS_AIRFLOW_CLIENT_SECRET}
    MINIO_INGESTION_ACCESS_KEY: ${MINIO_INGESTION_ACCESS_KEY}
    MINIO_INGESTION_SECRET_KEY: ${MINIO_INGESTION_SECRET_KEY}
  depends_on:
    pgbouncer:
      condition: service_healthy
    redis:
      condition: service_healthy
  logging: *default-logging

services:

  # ===========================================================================
  # STORAGE LAYER — MinIO Distributed (4 nodes, EC:4)
  # ===========================================================================

  minio-1:
    <<: *minio-common
    hostname: minio-1
    volumes:
      - minio-1-data1:/data1
      - minio-1-data2:/data2
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
        reservations:
          memory: 512M

  minio-2:
    <<: *minio-common
    hostname: minio-2
    volumes:
      - minio-2-data1:/data1
      - minio-2-data2:/data2
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
        reservations:
          memory: 512M

  minio-3:
    <<: *minio-common
    hostname: minio-3
    volumes:
      - minio-3-data1:/data1
      - minio-3-data2:/data2
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
        reservations:
          memory: 512M

  minio-4:
    <<: *minio-common
    hostname: minio-4
    volumes:
      - minio-4-data1:/data1
      - minio-4-data2:/data2
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
        reservations:
          memory: 512M

  # ===========================================================================
  # DATABASE LAYER — PostgreSQL 16 (shared backend)
  # ===========================================================================

  postgresql:
    image: postgres:16
    hostname: postgresql
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      # Per-service DB credentials (consumed by init-databases.sh)
      KEYCLOAK_DB: ${KEYCLOAK_DB}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POLARIS_DB: ${POLARIS_DB}
      POLARIS_DB_USER: ${POLARIS_DB_USER}
      POLARIS_DB_PASSWORD: ${POLARIS_DB_PASSWORD}
      NESSIE_DB: ${NESSIE_DB}
      NESSIE_DB_USER: ${NESSIE_DB_USER}
      NESSIE_DB_PASSWORD: ${NESSIE_DB_PASSWORD}
      RANGER_DB: ${RANGER_DB}
      RANGER_DB_USER: ${RANGER_DB_USER}
      RANGER_DB_PASSWORD: ${RANGER_DB_PASSWORD}
      AIRFLOW_DB: ${AIRFLOW_DB}
      AIRFLOW_DB_USER: ${AIRFLOW_DB_USER}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      OPENMETADATA_DB: ${OPENMETADATA_DB}
      OPENMETADATA_DB_USER: ${OPENMETADATA_DB_USER}
      OPENMETADATA_DB_PASSWORD: ${OPENMETADATA_DB_PASSWORD}
      TRINO_GATEWAY_DB_USER: ${TRINO_GATEWAY_DB_USER}
      TRINO_GATEWAY_DB_PASSWORD: ${TRINO_GATEWAY_DB_PASSWORD}
    volumes:
      - postgresql-data:/var/lib/postgresql/data
      - ./volumes/postgresql/init-databases.sh:/docker-entrypoint-initdb.d/01-init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M
    logging: *default-logging

  # ─── PgBouncer — connection pooler ─────────────────────────────────────────
  pgbouncer:
    image: bitnami/pgbouncer:latest
    hostname: pgbouncer
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      # Pool all databases via wildcard — services connect with their own credentials
      PGBOUNCER_DATABASE: "*"
      POSTGRESQL_HOST: postgresql
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: ${POSTGRES_USER}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      PGBOUNCER_AUTH_TYPE: scram-sha-256
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-500}
      PGBOUNCER_DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-20}
      PGBOUNCER_PORT_NUMBER: ${PGBOUNCER_PORT:-6432}
    ports:
      - "6432:6432"
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p ${PGBOUNCER_PORT:-6432} -U $$POSTGRESQL_USERNAME"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 64M
    logging: *default-logging

  # ===========================================================================
  # SECRET MANAGEMENT — OpenBao Raft HA (3 nodes)
  # ===========================================================================
  # Bootstrap sequence: openbao-1 initializes, then openbao-2 and openbao-3 join.
  # Run: make dev-up THEN: scripts/bootstrap/01-init-openbao.sh

  openbao-1:
    image: quay.io/openbao/openbao:latest
    hostname: openbao-1
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      OPENBAO_NODE_ID: openbao-1
      BAO_SKIP_VERIFY: "true"
    volumes:
      - openbao-1-data:/openbao/data
      - ./volumes/openbao/config.hcl:/openbao/config/config.hcl.tmpl:ro
      - ./volumes/openbao/policies:/openbao/policies:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed "s/__NODE_ID__/$${OPENBAO_NODE_ID}/g" /openbao/config/config.hcl.tmpl > /tmp/openbao-config.hcl
        exec bao server -config=/tmp/openbao-config.hcl
    ports:
      - "8200:8200"   # OpenBao API + UI
    cap_add:
      - IPC_LOCK     # Required for memory locking (prevents secrets being swapped to disk)
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://localhost:8200"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    logging: *default-logging

  openbao-2:
    image: quay.io/openbao/openbao:latest
    hostname: openbao-2
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      OPENBAO_NODE_ID: openbao-2
      BAO_SKIP_VERIFY: "true"
    volumes:
      - openbao-2-data:/openbao/data
      - ./volumes/openbao/config.hcl:/openbao/config/config.hcl.tmpl:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed "s/__NODE_ID__/$${OPENBAO_NODE_ID}/g" /openbao/config/config.hcl.tmpl > /tmp/openbao-config.hcl
        exec bao server -config=/tmp/openbao-config.hcl
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://localhost:8200"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    depends_on:
      openbao-1:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    logging: *default-logging

  openbao-3:
    image: quay.io/openbao/openbao:latest
    hostname: openbao-3
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      OPENBAO_NODE_ID: openbao-3
      BAO_SKIP_VERIFY: "true"
    volumes:
      - openbao-3-data:/openbao/data
      - ./volumes/openbao/config.hcl:/openbao/config/config.hcl.tmpl:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed "s/__NODE_ID__/$${OPENBAO_NODE_ID}/g" /openbao/config/config.hcl.tmpl > /tmp/openbao-config.hcl
        exec bao server -config=/tmp/openbao-config.hcl
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://localhost:8200"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    depends_on:
      openbao-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    logging: *default-logging

  # ===========================================================================
  # IDENTITY — Keycloak OIDC Provider
  # ===========================================================================

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    hostname: keycloak
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://pgbouncer:${PGBOUNCER_PORT:-6432}/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: keycloak
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Inject OIDC client secrets so realm-export.json can reference them
      KEYCLOAK_TRINO_CLIENT_SECRET: ${KEYCLOAK_TRINO_CLIENT_SECRET}
      KEYCLOAK_AIRFLOW_CLIENT_SECRET: ${KEYCLOAK_AIRFLOW_CLIENT_SECRET}
      KEYCLOAK_OPENMETADATA_CLIENT_SECRET: ${KEYCLOAK_OPENMETADATA_CLIENT_SECRET}
      KEYCLOAK_GRAFANA_CLIENT_SECRET: ${KEYCLOAK_GRAFANA_CLIENT_SECRET}
      KEYCLOAK_MINIO_CLIENT_SECRET: ${KEYCLOAK_MINIO_CLIENT_SECRET}
    # start-dev: no cluster discovery needed for local dev single node
    command: start-dev --import-realm
    volumes:
      - ./volumes/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"   # Keycloak UI + OIDC endpoints
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
        reservations:
          memory: 512M
    logging: *default-logging

  # ===========================================================================
  # CATALOG LAYER — Apache Polaris 1.2.0 (Production Iceberg REST Catalog)
  # ===========================================================================

  polaris:
    image: apache/polaris:1.2.0
    hostname: polaris
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      POLARIS_DB_USER: ${POLARIS_DB_USER}
      POLARIS_DB_PASSWORD: ${POLARIS_DB_PASSWORD}
      POLARIS_DB: ${POLARIS_DB}
      POLARIS_BOOTSTRAP_ADMIN_CLIENT_ID: ${POLARIS_BOOTSTRAP_ADMIN_CLIENT_ID}
      POLARIS_BOOTSTRAP_ADMIN_SECRET: ${POLARIS_BOOTSTRAP_ADMIN_SECRET}
    volumes:
      - ./volumes/polaris/polaris-server.yml:/app/config/polaris-server.yml:ro
    ports:
      - "8181:8181"   # Iceberg REST catalog endpoint
      - "8182:8182"   # Polaris admin API
    depends_on:
      pgbouncer:
        condition: service_healthy
      minio-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8182/healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 512M
    logging: *default-logging

  # ─── Project Nessie (Dev/CI Catalog) ────────────────────────────────────────

  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    hostname: nessie
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      NESSIE_DB_USER: ${NESSIE_DB_USER}
      NESSIE_DB_PASSWORD: ${NESSIE_DB_PASSWORD}
      NESSIE_DB: ${NESSIE_DB}
      NESSIE_AUTH_TOKEN: ${NESSIE_AUTH_TOKEN}
      MINIO_INGESTION_ACCESS_KEY: ${MINIO_INGESTION_ACCESS_KEY}
      MINIO_INGESTION_SECRET_KEY: ${MINIO_INGESTION_SECRET_KEY}
    volumes:
      - ./volumes/nessie/application.properties:/deployments/config/application.properties:ro
    ports:
      - "19120:19120"   # Nessie REST + Iceberg REST
    depends_on:
      pgbouncer:
        condition: service_healthy
      minio-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:19120/q/health/ready"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M
        reservations:
          memory: 256M
    logging: *default-logging

  # ===========================================================================
  # POLICY ENGINE — Apache Solr + Ranger Admin 2.6.0
  # ===========================================================================

  solr:
    image: solr:9
    hostname: solr
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      SOLR_HEAP: "512m"
    volumes:
      - solr-data:/var/solr
    command: >
      sh -c "
        docker-entrypoint.sh solr-precreate ranger_audits &&
        docker-entrypoint.sh solr-foreground
      "
    ports:
      - "8983:8983"   # Solr admin UI (internal use only)
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8983/solr/ranger_audits/admin/ping"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 512M
    logging: *default-logging

  ranger-admin:
    # NOTE: apache/ranger:2.6.0 image — verify tag availability on Docker Hub.
    # If not available, build from: https://github.com/apache/ranger/tree/release-ranger-2.6.0
    image: apache/ranger:2.6.0
    hostname: ranger-admin
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      RANGER_DB_HOST: pgbouncer
      RANGER_DB_PORT: ${PGBOUNCER_PORT:-6432}
      RANGER_DB: ${RANGER_DB}
      RANGER_DB_USER: ${RANGER_DB_USER}
      RANGER_DB_PASSWORD: ${RANGER_DB_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RANGER_ADMIN_PASSWORD: ${RANGER_ADMIN_PASSWORD}
      RANGER_TRINO_SERVICE_NAME: ${RANGER_TRINO_SERVICE_NAME}
    volumes:
      - ./volumes/ranger/install.properties:/opt/ranger-admin/install.properties:ro
      - ./volumes/ranger/ranger-admin-site.xml:/opt/ranger-admin/conf/ranger-admin-site.xml:ro
      - ./volumes/ranger/ranger-ugsync-site.xml:/opt/ranger-admin/conf/ranger-ugsync-site.xml:ro
    ports:
      - "6080:6080"   # Ranger Admin UI
    depends_on:
      pgbouncer:
        condition: service_healthy
      solr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6080/index.html"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
        reservations:
          memory: 512M
    logging: *default-logging

  # ===========================================================================
  # COMPUTE LAYER — Trino 479 (1 coordinator + 3 workers) + Gateway
  # ===========================================================================
  #
  # Ranger plugin note: The Apache Ranger 2.6.0 Trino plugin JAR must be present
  # at /usr/lib/trino/plugin/ranger/ inside the Trino containers.
  # Run: scripts/bootstrap/05-init-ranger.sh to download and stage the JAR.
  # The ./volumes/trino/ranger-plugin/ volume is mounted to that path.

  trino-coordinator:
    image: trinodb/trino:479
    hostname: trino-coordinator
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      POLARIS_TRINO_CLIENT_ID: ${POLARIS_TRINO_CLIENT_ID}
      POLARIS_TRINO_CLIENT_SECRET: ${POLARIS_TRINO_CLIENT_SECRET}
      NESSIE_AUTH_TOKEN: ${NESSIE_AUTH_TOKEN}
      MINIO_INGESTION_ACCESS_KEY: ${MINIO_INGESTION_ACCESS_KEY}
      MINIO_INGESTION_SECRET_KEY: ${MINIO_INGESTION_SECRET_KEY}
      TRINO_INTERNAL_SHARED_SECRET: ${TRINO_INTERNAL_SHARED_SECRET}
      RANGER_ADMIN_PASSWORD: ${RANGER_ADMIN_PASSWORD}
      RANGER_URL: ${RANGER_URL}
      RANGER_TRINO_SERVICE_NAME: ${RANGER_TRINO_SERVICE_NAME}
      TRINO_JVM_HEAP: ${TRINO_JVM_HEAP:-4G}
    volumes:
      - ./volumes/trino/conf/config.properties:/etc/trino/config.properties:ro
      - ./volumes/trino/conf/jvm.config:/etc/trino/jvm.config:ro
      - ./volumes/trino/conf/log.properties:/etc/trino/log.properties:ro
      - ./volumes/trino/catalog/iceberg-polaris.properties:/etc/trino/catalog/iceberg_polaris.properties:ro
      - ./volumes/trino/catalog/iceberg-nessie.properties:/etc/trino/catalog/iceberg_nessie.properties:ro
      - ./volumes/trino/ranger-plugin:/usr/lib/trino/plugin/ranger:ro,z
    ports:
      - "8090:8080"   # Trino UI and JDBC (exposed as 8090 to avoid clash with Keycloak 8080)
    depends_on:
      polaris:
        condition: service_healthy
      ranger-admin:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 5G
        reservations:
          memory: 1G
    logging: *default-logging

  trino-worker-1:
    image: trinodb/trino:479
    hostname: trino-worker-1
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      POLARIS_TRINO_CLIENT_ID: ${POLARIS_TRINO_CLIENT_ID}
      POLARIS_TRINO_CLIENT_SECRET: ${POLARIS_TRINO_CLIENT_SECRET}
      NESSIE_AUTH_TOKEN: ${NESSIE_AUTH_TOKEN}
      MINIO_INGESTION_ACCESS_KEY: ${MINIO_INGESTION_ACCESS_KEY}
      MINIO_INGESTION_SECRET_KEY: ${MINIO_INGESTION_SECRET_KEY}
      TRINO_INTERNAL_SHARED_SECRET: ${TRINO_INTERNAL_SHARED_SECRET}
      TRINO_JVM_HEAP: ${TRINO_JVM_HEAP:-4G}
    volumes:
      - ./volumes/trino/conf/config-worker.properties:/etc/trino/config.properties:ro
      - ./volumes/trino/conf/jvm.config:/etc/trino/jvm.config:ro
      - ./volumes/trino/conf/log.properties:/etc/trino/log.properties:ro
      - ./volumes/trino/catalog/iceberg-polaris.properties:/etc/trino/catalog/iceberg_polaris.properties:ro
      - ./volumes/trino/catalog/iceberg-nessie.properties:/etc/trino/catalog/iceberg_nessie.properties:ro
      - ./volumes/trino/ranger-plugin:/usr/lib/trino/plugin/ranger:ro,z
    depends_on:
      trino-coordinator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 5G
        reservations:
          memory: 1G
    logging: *default-logging

  trino-worker-2:
    image: trinodb/trino:479
    hostname: trino-worker-2
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      POLARIS_TRINO_CLIENT_ID: ${POLARIS_TRINO_CLIENT_ID}
      POLARIS_TRINO_CLIENT_SECRET: ${POLARIS_TRINO_CLIENT_SECRET}
      NESSIE_AUTH_TOKEN: ${NESSIE_AUTH_TOKEN}
      MINIO_INGESTION_ACCESS_KEY: ${MINIO_INGESTION_ACCESS_KEY}
      MINIO_INGESTION_SECRET_KEY: ${MINIO_INGESTION_SECRET_KEY}
      TRINO_INTERNAL_SHARED_SECRET: ${TRINO_INTERNAL_SHARED_SECRET}
      TRINO_JVM_HEAP: ${TRINO_JVM_HEAP:-4G}
    volumes:
      - ./volumes/trino/conf/config-worker.properties:/etc/trino/config.properties:ro
      - ./volumes/trino/conf/jvm.config:/etc/trino/jvm.config:ro
      - ./volumes/trino/conf/log.properties:/etc/trino/log.properties:ro
      - ./volumes/trino/catalog/iceberg-polaris.properties:/etc/trino/catalog/iceberg_polaris.properties:ro
      - ./volumes/trino/catalog/iceberg-nessie.properties:/etc/trino/catalog/iceberg_nessie.properties:ro
      - ./volumes/trino/ranger-plugin:/usr/lib/trino/plugin/ranger:ro,z
    depends_on:
      trino-coordinator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 5G
        reservations:
          memory: 1G
    logging: *default-logging

  trino-worker-3:
    image: trinodb/trino:479
    hostname: trino-worker-3
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      POLARIS_TRINO_CLIENT_ID: ${POLARIS_TRINO_CLIENT_ID}
      POLARIS_TRINO_CLIENT_SECRET: ${POLARIS_TRINO_CLIENT_SECRET}
      NESSIE_AUTH_TOKEN: ${NESSIE_AUTH_TOKEN}
      MINIO_INGESTION_ACCESS_KEY: ${MINIO_INGESTION_ACCESS_KEY}
      MINIO_INGESTION_SECRET_KEY: ${MINIO_INGESTION_SECRET_KEY}
      TRINO_INTERNAL_SHARED_SECRET: ${TRINO_INTERNAL_SHARED_SECRET}
      TRINO_JVM_HEAP: ${TRINO_JVM_HEAP:-4G}
    volumes:
      - ./volumes/trino/conf/config-worker.properties:/etc/trino/config.properties:ro
      - ./volumes/trino/conf/jvm.config:/etc/trino/jvm.config:ro
      - ./volumes/trino/conf/log.properties:/etc/trino/log.properties:ro
      - ./volumes/trino/catalog/iceberg-polaris.properties:/etc/trino/catalog/iceberg_polaris.properties:ro
      - ./volumes/trino/catalog/iceberg-nessie.properties:/etc/trino/catalog/iceberg_nessie.properties:ro
      - ./volumes/trino/ranger-plugin:/usr/lib/trino/plugin/ranger:ro,z
    depends_on:
      trino-coordinator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 5G
        reservations:
          memory: 1G
    logging: *default-logging

  # ─── Trino Gateway ───────────────────────────────────────────────────────────

  trino-gateway:
    image: trinodb/trino-gateway:latest
    hostname: trino-gateway
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      # Gateway state: stored in PostgreSQL
      BACKEND_JDBC_URL: ${TRINO_GATEWAY_BACKEND_JDBC_URL}
      BACKEND_JDBC_USER: ${TRINO_GATEWAY_DB_USER}
      BACKEND_JDBC_PASSWORD: ${TRINO_GATEWAY_DB_PASSWORD}
      # Keycloak JWKS for JWT validation
      OAUTH2_JWKS_URL: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs
    volumes:
      - ./volumes/trino-gateway/gateway-config.yml:/opt/trino-gateway/gateway-config.yml:ro
    ports:
      - "9090:9090"   # Trino Gateway API (JDBC/HTTP)
      - "9091:9091"   # Trino Gateway Admin UI
    depends_on:
      trino-coordinator:
        condition: service_healthy
      trino-worker-1:
        condition: service_healthy
      trino-worker-2:
        condition: service_healthy
      trino-worker-3:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9091/api/public/backends"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M
    logging: *default-logging

  # ===========================================================================
  # METADATA LAYER — ElasticSearch + OpenMetadata
  # ===========================================================================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    hostname: elasticsearch
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      discovery.type: single-node
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"   # Elasticsearch REST API
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:$$ELASTIC_PASSWORD http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1536M
        reservations:
          memory: 512M
    logging: *default-logging

  openmetadata-server:
    image: docker.openmetadata.org/openmetadata/server:1.5.0
    hostname: openmetadata-server
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      DB_DRIVER_CLASS: org.postgresql.Driver
      DB_SCHEME: postgresql
      DB_HOST: pgbouncer
      DB_PORT: ${PGBOUNCER_PORT:-6432}
      DB_USER: ${OPENMETADATA_DB_USER}
      DB_USER_PASSWORD: ${OPENMETADATA_DB_PASSWORD}
      OM_DATABASE: ${OPENMETADATA_DB}
      ELASTIC_HOST: elasticsearch
      ELASTIC_PORT: 9200
      ELASTICSEARCH_USER: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD}
      OPENMETADATA_CLUSTER_NAME: lakehouse
      AUTH_PROVIDER: custom-oidc
      CUSTOM_OIDC_CLIENT_ID: openmetadata
      CUSTOM_OIDC_SECRET_KEY: ${KEYCLOAK_OPENMETADATA_CLIENT_SECRET}
      CUSTOM_OIDC_TOKEN_ENDPOINT: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/token
      JWT_ISSUER: ${OPENMETADATA_JWT_ISSUER}
      JWT_KEY_ID: Gb389A-9f76-gdjs-a92j-0242bk94356
      RSA_PUBLIC_KEY_FILE_PATH: /etc/openmetadata/jwt/public_key.der
      RSA_PRIVATE_KEY_FILE_PATH: /etc/openmetadata/jwt/private_key.der
      PIPELINE_SERVICE_CLIENT_ENDPOINT: http://airflow-webserver:8090
    volumes:
      - ./volumes/openmetadata/openmetadata.yaml:/opt/openmetadata/conf/openmetadata.yaml:ro
    ports:
      - "8585:8585"   # OpenMetadata UI
    depends_on:
      pgbouncer:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8585/healthcheck"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 2G
        reservations:
          memory: 512M
    logging: *default-logging

  openmetadata-ingestion:
    image: docker.openmetadata.org/openmetadata/ingestion:1.5.0
    hostname: openmetadata-ingestion
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      AIRFLOW_HOST: http://airflow-webserver:8090
      AIRFLOW_USERNAME: ${AIRFLOW_ADMIN_USER}
      AIRFLOW_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      OPENMETADATA_SERVER_URL: http://openmetadata-server:8585/api
    depends_on:
      openmetadata-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 256M
    logging: *default-logging

  # ===========================================================================
  # INGESTION LAYER — Redis + Airflow (CeleryExecutor)
  # ===========================================================================

  redis:
    image: redis:7-alpine
    hostname: redis
    restart: unless-stopped
    networks:
      - lakehouse-net
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly no
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          memory: 64M
    logging: *default-logging

  airflow-webserver:
    <<: *airflow-common
    hostname: airflow-webserver
    command: webserver
    environment:
      <<: *airflow-common
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    ports:
      - "8091:8090"   # Airflow UI (8090 internal, 8091 external to avoid Trino clash)
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
        reservations:
          memory: 256M

  airflow-scheduler:
    <<: *airflow-common
    hostname: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname airflow-scheduler"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M

  airflow-worker:
    <<: *airflow-common
    hostname: airflow-worker
    command: celery worker
    environment:
      <<: *airflow-common
      DUMB_INIT_SETSID: "0"
    healthcheck:
      test: ["CMD-SHELL", "celery --app airflow.executors.celery_executor.app inspect ping -d celery@airflow-worker"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M

  # ─── Docling REST API ─────────────────────────────────────────────────────────

  docling-api:
    # IBM Docling serve image — provides a REST API wrapper for the Docling library
    # Source: https://github.com/DS4SD/docling-serve
    image: quay.io/ds4sd/docling-serve:latest
    hostname: docling-api
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      DOCLING_API_KEY: ${DOCLING_API_KEY}
      MINIO_ENDPOINT: http://minio-1:9000
      MINIO_ACCESS_KEY: ${MINIO_INGESTION_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_INGESTION_SECRET_KEY}
      DOCLING_OUTPUT_BUCKET: staging
      # Run fully offline — no external API calls
      DOCLING_DISABLE_TELEMETRY: "true"
    ports:
      - "5001:5001"   # Docling REST API
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "4.0"   # Document parsing is CPU-intensive
          memory: 4G
        reservations:
          memory: 1G
    logging: *default-logging

  # ===========================================================================
  # OBSERVABILITY — Prometheus, Alertmanager, Grafana, Loki, Promtail, OTel
  # ===========================================================================

  prometheus:
    image: prom/prometheus:latest
    hostname: prometheus
    restart: unless-stopped
    networks:
      - lakehouse-net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-remote-write-receiver"
      - "--web.enable-lifecycle"
    volumes:
      - prometheus-data:/prometheus
      - ./volumes/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./volumes/prometheus/rules:/etc/prometheus/rules:ro
    ports:
      - "9092:9090"   # Prometheus UI (9092 external to avoid Trino Gateway clash)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          memory: 256M
    logging: *default-logging

  alertmanager:
    image: prom/alertmanager:latest
    hostname: alertmanager
    restart: unless-stopped
    networks:
      - lakehouse-net
    volumes:
      - ./volumes/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"   # Alertmanager UI
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 64M
    logging: *default-logging

  grafana:
    image: grafana/grafana:latest
    hostname: grafana
    restart: unless-stopped
    networks:
      - lakehouse-net
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY}
      # Keycloak OIDC
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: Keycloak
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${KEYCLOAK_GRAFANA_CLIENT_SECRET}
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/auth
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/token
      GF_AUTH_GENERIC_OAUTH_USERINFO_URL: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/userinfo
      GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email groups
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(groups[*], 'platform-admins') && 'Admin' || contains(groups[*], 'data-engineers') && 'Editor' || 'Viewer'"
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./volumes/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./volumes/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"   # Grafana UI
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    logging: *default-logging

  loki:
    image: grafana/loki:latest
    hostname: loki
    restart: unless-stopped
    networks:
      - lakehouse-net
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
      - ./volumes/loki/local-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"   # Loki HTTP API
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    logging: *default-logging

  promtail:
    image: grafana/promtail:latest
    hostname: promtail
    restart: unless-stopped
    networks:
      - lakehouse-net
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./volumes/promtail/config.yml:/etc/promtail/config.yml:ro
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9080/ready"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          memory: 64M
    logging: *default-logging

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    hostname: otel-collector
    restart: unless-stopped
    networks:
      - lakehouse-net
    command: --config=/etc/otel/otel-collector-config.yaml
    volumes:
      - ./volumes/otel/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # OTel collector self-metrics (Prometheus)
      - "55679:55679" # zpages debug UI
    environment:
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:13133/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          memory: 128M
    logging: *default-logging
