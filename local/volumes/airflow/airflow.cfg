# =============================================================================
# Apache Airflow 2.10.x — airflow.cfg (local development overrides)
# Full config reference: https://airflow.apache.org/docs/apache-airflow/stable/configurations-ref.html
#
# Approach: set critical values here; all secrets come from environment variables
#           (AIRFLOW__SECTION__KEY naming convention overrides cfg values).
# =============================================================================

[core]
# CeleryExecutor: workers are separate containers; Redis is the broker
executor = CeleryExecutor

# Database connection (override via env: AIRFLOW__CORE__SQL_ALCHEMY_CONN)
# Actual value set by: AIRFLOW__CORE__SQL_ALCHEMY_CONN in docker-compose.yml
sql_alchemy_conn = postgresql://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@pgbouncer:6432/${AIRFLOW_DB}

# Fernet key for encrypting connection passwords (must be base64 32-byte key)
# Set via: AIRFLOW__CORE__FERNET_KEY env var
fernet_key =

# DAGs folder (mounted via volume in docker-compose)
dags_folder = /opt/airflow/dags

# Parallelism settings (adapt to local resources)
parallelism = 32
max_active_tasks_per_dag = 16
max_active_runs_per_dag = 4

# Load example DAGs (disable in production)
load_examples = false

# Timezone
default_timezone = UTC

[webserver]
# Flask secret key for session signing
# Set via: AIRFLOW__WEBSERVER__SECRET_KEY env var
secret_key =

# OIDC authentication via Keycloak (FAB auth backend)
# auth_backend = airflow.providers.fab.auth_manager.fab_auth_manager
auth_backend = airflow.api.auth.backend.basic_auth

# Default UI role for new users (until Keycloak group sync maps roles)
default_ui_timezone = UTC
expose_config = false

# HTTP port for webserver container
web_server_port = 8090

[logging]
# Use JSON logging for structured log ingestion by Promtail
log_format = [%(asctime)s] {%(filename)s:%(lineno)d} %(levelname)s - %(message)s
colored_console_log = false

# Remote logging to MinIO (S3-compatible)
remote_logging = true
remote_log_conn_id = minio_default
remote_base_log_folder = s3://backup/airflow-logs

[celery]
# Celery broker: Redis with AUTH
# broker_url set via env: AIRFLOW__CELERY__BROKER_URL
broker_url = redis://:${REDIS_PASSWORD}@redis:6379/0

# Result backend: PostgreSQL (more reliable than Redis for task results)
result_backend = postgresql://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@pgbouncer:6432/${AIRFLOW_DB}

# Worker concurrency (adapt to local resources)
worker_concurrency = 8

# Workers check in every 30s
worker_timeout = 120

[celery_broker_transport_options]
visibility_timeout = 21600

[scheduler]
# DAG file processing interval
dag_dir_list_interval = 30

# How often the scheduler checks for new DAG runs
schedule_after_task_execution = true

[secrets]
# OpenBao (Vault-compatible) backend for secrets
# This allows connections defined in Airflow to pull creds from OpenBao at runtime
backend = airflow.providers.hashicorp.secrets.vault.VaultBackend
backend_kwargs = {
    "connections_path": "airflow/connections",
    "variables_path": "airflow/variables",
    "url": "http://openbao-1:8200",
    "token": "_OPENBAO_TOKEN_INJECTED_AT_RUNTIME_",
    "mount_point": "secret"
  }

[smtp]
# Disable SMTP for local dev (no email alerts)
smtp_host =
smtp_mail_from = airflow@lakehouse.local

[metrics]
# Expose Airflow metrics to OTel Collector
statsd_on = false
otel_on = true
otel_host = otel-collector
otel_port = 4317

[traces]
otel_on = true
otel_host = otel-collector
otel_port = 4317
