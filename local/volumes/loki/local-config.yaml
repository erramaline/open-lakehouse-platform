##
## Loki — local storage configuration for Open Lakehouse Platform
## Docs: https://grafana.com/docs/loki/latest/configure/
##
## Storage: filesystem (local dev) — switch to S3 for staging/prod.
##

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  log_level:        info
  log_format:       json

common:
  instance_addr: 127.0.0.1
  path_prefix:   /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# ─── Ingester ─────────────────────────────────────────────────────────────────
ingester:
  wal:
    dir:     /loki/wal
    enabled: true
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  chunk_idle_period:              1h
  max_chunk_age:                  2h
  chunk_target_size:              1048576   # 1 MiB
  chunk_retain_period:            30s

# ─── Schema config ────────────────────────────────────────────────────────────
schema_config:
  configs:
    - from:           2024-01-01
      store:          tsdb
      object_store:   filesystem
      schema:         v13
      index:
        prefix: loki_index_
        period: 24h

# ─── Storage config ───────────────────────────────────────────────────────────
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location:          /loki/cache
    cache_ttl:               24h
  filesystem:
    directory: /loki/chunks

# ─── Compactor ────────────────────────────────────────────────────────────────
compactor:
  working_directory:        /loki/compactor
  compaction_interval:      10m
  retention_enabled:        true
  retention_delete_delay:   2h
  retention_delete_worker_count: 150
  delete_request_store:     filesystem

# ─── Limits (retention + ingestion) ──────────────────────────────────────────
limits_config:
  # Retention: 30 days in local dev
  retention_period:          720h
  # Ingestion limits (generous for local dev)
  ingestion_rate_mb:         32
  ingestion_burst_size_mb:   64
  max_label_names_per_series: 30
  max_entries_limit_per_query: 50000
  # Query range limit: 28 days
  max_query_lookback:        672h
  max_query_length:          168h
  # Cardinality limits
  max_streams_per_user:      50000
  max_global_streams_per_user: 100000
  # Reject old samples
  reject_old_samples:        true
  reject_old_samples_max_age: 168h

# ─── Query range ──────────────────────────────────────────────────────────────
query_range:
  results_cache:
    cache:
      enable_fifocache: true
      fifocache:
        max_size_items: 1024
        ttl:            24h

# ─── Ruler (alerting) ─────────────────────────────────────────────────────────
ruler:
  storage:
    type:       local
    local:
      directory: /loki/rules
  rule_path:    /loki/rules-tmp
  alertmanager_url: http://alertmanager:9093
  ring:
    kvstore:
      store: inmemory
  enable_api:   true

# ─── Analytics (opt out) ─────────────────────────────────────────────────────
analytics:
  reporting_enabled: false
