# =============================================================================
# Project Nessie — application.properties (local development)
# Backend: PostgreSQL (shared instance, dedicated 'nessie' schema)
# Per ADR-005: Nessie is the dev/CI catalog with Git-like branch semantics.
# =============================================================================

# ─── Server ──────────────────────────────────────────────────────────────────
quarkus.http.port=19120
quarkus.http.cors=true
quarkus.http.cors.origins=*

# ─── Catalog version store — PostgreSQL ──────────────────────────────────────
nessie.version.store.type=JDBC
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${NESSIE_DB_USER}
quarkus.datasource.password=${NESSIE_DB_PASSWORD}
quarkus.datasource.jdbc.url=jdbc:postgresql://pgbouncer:6432/${NESSIE_DB}

# Flyway auto-migration (creates Nessie schema tables on first boot)
quarkus.flyway.migrate-at-start=true

# ─── Default branch ──────────────────────────────────────────────────────────
nessie.server.default-branch=main

# ─── Authentication — Bearer token ───────────────────────────────────────────
# For local dev: simple fixed token (set via NESSIE_AUTH_TOKEN in .env)
# In K8s staging/prod: replace with OIDC (Keycloak) token validation
nessie.server.authentication.enabled=true
quarkus.oidc.enabled=false

# Simple token validator for local dev
nessie.server.authentication.type=BEARER
nessie.server.authentication.bearer.secret=${NESSIE_AUTH_TOKEN}

# ─── Storage — Iceberg warehouse on MinIO ────────────────────────────────────
# This configures where Nessie tells clients to read/write Iceberg data.
# The actual bucket layout: s3://iceberg-dev/
nessie.catalog.default-warehouse=lakehouse-dev
nessie.catalog.warehouses.lakehouse-dev.location=s3://iceberg/dev/

# S3 / MinIO config
nessie.catalog.service.s3.default-options.endpoint=http://minio-1:9000
nessie.catalog.service.s3.default-options.path-style-access=true
nessie.catalog.service.s3.default-options.region=us-east-1
nessie.catalog.service.s3.default-options.access-key.name=${MINIO_INGESTION_ACCESS_KEY}
nessie.catalog.service.s3.default-options.access-key.secret=${MINIO_INGESTION_SECRET_KEY}

# ─── Tracing ─────────────────────────────────────────────────────────────────
quarkus.otel.exporter.otlp.endpoint=http://otel-collector:4317
quarkus.otel.enabled=true

# ─── Metrics ─────────────────────────────────────────────────────────────────
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# ─── Logging ─────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."org.projectnessie".level=INFO
