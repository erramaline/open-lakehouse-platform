# =============================================================================
# Apache Ranger 2.6.0 — install.properties
# Used by the Ranger setup.sh script to configure the admin service.
# All passwords are read from environment variables — never hardcoded here.
# =============================================================================

# ─── Ranger Admin Database (PostgreSQL via PgBouncer) ────────────────────────
DB_FLAVOR=POSTGRES
SQL_CONNECTOR_JAR=/usr/share/java/postgresql.jar
db_root_user=${POSTGRES_USER}
db_root_password=${POSTGRES_PASSWORD}
db_host=pgbouncer
db_port=6432
db_name=${RANGER_DB}
db_user=${RANGER_DB_USER}
db_password=${RANGER_DB_PASSWORD}

# ─── Ranger Admin Server ─────────────────────────────────────────────────────
# Ranger admin HTTP port (internal — not exposed outside Docker network)
ranger_admin_http_port=6080
ranger_admin_https_port=6182

# Admin user credentials (used for first login and API calls)
admin_password=${RANGER_ADMIN_PASSWORD}

# ─── Solr Audit Backend ───────────────────────────────────────────────────────
# Solr URL for storing audit events (also configured in ranger-trino-audit.xml)
audit_store=solr
audit_solr_url=http://solr:8983/solr/ranger_audits

# ─── Policy Manager URL ───────────────────────────────────────────────────────
# Used by Ranger plugins to download policies
policymgr_external_url=http://ranger-admin:6080

# ─── Unix Authentication ──────────────────────────────────────────────────────
UNIX_USER=ranger
UNIX_USER_PWD=${RANGER_ADMIN_PASSWORD}
UNIX_GROUP=ranger

# ─── Keycloak / LDAP User Sync (via ranger-ugsync) ───────────────────────────
# User/group sync is configured in ranger-ugsync-site.xml
# These control whether Ranger bootstraps its own user store
remoteLoginEnabled=true
authServiceHostName=ranger-admin
authServicePort=5151

# ─── HTTPS (disabled for local dev; mTLS handled at gateway layer) ────────────
is_internal_https_enabled=false
is_external_https_enabled=false
