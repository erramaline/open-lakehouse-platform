# =============================================================================
# Trino Iceberg catalog — Project Nessie (DEV / CI)
# REST catalog pointing to Nessie via Bearer token
# Per ADR-005: Nessie is EXCLUSIVELY for dev/CI branches; never for production data
# =============================================================================

connector.name=iceberg

# REST catalog type (Nessie implements the Iceberg REST spec)
iceberg.catalog.type=rest

# Nessie REST endpoint
iceberg.rest-catalog.uri=http://nessie:19120/iceberg/

# Default warehouse (maps to MinIO bucket prefix dev/)
iceberg.rest-catalog.warehouse=lakehouse-dev

# Bearer token authentication against Nessie
iceberg.rest-catalog.security=OAUTH2
iceberg.rest-catalog.oauth2.credential=${ENV:NESSIE_AUTH_TOKEN}

# Default branch (developers override per-session with USE CATALOG nessie BRANCH <name>)
iceberg.rest-catalog.default-branch=main

# S3 / MinIO for dev data
fs.native-s3.enabled=true
s3.endpoint=http://minio-1:9000
s3.path-style-access=true
s3.region=us-east-1
s3.aws-access-key=${ENV:MINIO_INGESTION_ACCESS_KEY}
s3.aws-secret-key=${ENV:MINIO_INGESTION_SECRET_KEY}

# Iceberg v2 tables
iceberg.table-default-write-version=2

# Metadata caching (shorter for dev — branch switches need fresh metadata)
iceberg.metadata-cache.enabled=true
iceberg.metadata-cache.expiration-interval=10s
