# =============================================================================
# Trino Iceberg catalog — Apache Polaris (PRODUCTION)
# REST catalog pointing to Polaris 1.2.0 via OAuth2 (Client Credentials)
# =============================================================================

connector.name=iceberg

# REST catalog type — required for Polaris compatibility
iceberg.catalog.type=rest

# Polaris REST endpoint (internal Docker hostname)
iceberg.rest-catalog.uri=http://polaris:8181/api/catalog

# Warehouse name registered in Polaris (created by 04-init-polaris.sh)
iceberg.rest-catalog.warehouse=lakehouse

# OAuth2 authentication (Client Credentials grant)
iceberg.rest-catalog.security=OAUTH2
iceberg.rest-catalog.oauth2.credential=${ENV:POLARIS_TRINO_CLIENT_ID}:${ENV:POLARIS_TRINO_CLIENT_SECRET}
iceberg.rest-catalog.oauth2.server-uri=http://polaris:8181/api/catalog/v1/oauth/tokens
iceberg.rest-catalog.oauth2.scope=PRINCIPAL_ROLE:ALL

# File I/O: use S3-compatible MinIO via no-signing (credentials from Polaris credential vending)
iceberg.file-io.impl=org.apache.iceberg.hadoop.HadoopFileIO

# S3 config for direct reads (Polaris handles cred vending; Trino uses these as fallback)
fs.native-s3.enabled=true
s3.endpoint=http://minio-1:9000
s3.path-style-access=true
s3.region=us-east-1

# Iceberg v2 table format (required for row-level deletes, merge-on-read)
iceberg.table-default-write-version=2

# Metadata caching (30s TTL — must align with Ranger policy cache TTL)
iceberg.metadata-cache.enabled=true
iceberg.metadata-cache.expiration-interval=30s

# Split planning
iceberg.max-partitions-per-scan=20000
