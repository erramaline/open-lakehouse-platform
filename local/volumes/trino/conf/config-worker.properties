# =============================================================================
# Trino 479 — Worker configuration (local development)
# Mounted into: trino-worker-1, trino-worker-2, trino-worker-3
# NODE_ID is set per container via TRINO_NODE_ID env var and entrypoint.
# =============================================================================

# This node is a worker, not the coordinator
coordinator=false

# HTTP port (same across all workers; different internal IPs from Docker)
http-server.http.port=8080

# Workers find the coordinator via discovery
discovery.uri=http://trino-coordinator:8080

# Per-worker memory limits (local dev)
query.max-memory-per-node=2GB
query.max-total-memory-per-node=3GB

# Spill for large sorts/joins
spill-enabled=true
spiller-spill-path=/var/trino/spill

# Internal communication shared secret (must match coordinator)
internal-communication.shared-secret=${ENV:TRINO_INTERNAL_SHARED_SECRET}
