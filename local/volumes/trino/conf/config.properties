# =============================================================================
# Trino 479 — Coordinator configuration (local development)
# =============================================================================

# This node IS the coordinator
coordinator=true

# Coordinator does NOT schedule queries (dedicated workers only)
node-scheduler.include-coordinator=false

# HTTP port for Trino protocol
http-server.http.port=8080

# Discovery service URI — points back to this coordinator
discovery.uri=http://trino-coordinator:8080

# Cluster memory limits (local dev: conservative)
query.max-memory=8GB
query.max-memory-per-node=2GB
query.max-total-memory-per-node=3GB

# Spill to disk for large queries
spill-enabled=true
spiller-spill-path=/var/trino/spill

# Authentication: JWT from Keycloak (validated by trino-gateway in prod)
# For local dev: HTTP (no TLS termination at Trino level; gateway handles HTTPS)
http-server.authentication.type=JWT
http-server.authentication.jwt.key-file=http://keycloak:8080/realms/lakehouse/protocol/openid-connect/certs

# Internal shared secret for coordinator ↔ worker communication
internal-communication.shared-secret=${ENV:TRINO_INTERNAL_SHARED_SECRET}

# Node state change listener (Ranger plugin uses this for principal resolution)
http-server.process-forwarded=true

# Access control — Ranger plugin (loaded from /etc/trino/access-control.properties)
access-control.config-files=/etc/trino/access-control.properties
