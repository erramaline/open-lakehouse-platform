# =============================================================================
# Trino 479 — Logging configuration
# =============================================================================

# Root logger level
io.trino=INFO

# Reduce OTel/trace noise in local dev
io.opentelemetry=WARN
io.grpc=WARN

# Ranger plugin logging (set to DEBUG when troubleshooting policy issues)
org.apache.ranger=INFO

# Iceberg catalog operations (set to DEBUG when troubleshooting catalog issues)
org.apache.iceberg=INFO

# S3 FileIO — verbose for debugging MinIO connectivity
org.apache.iceberg.hadoop=WARN
software.amazon.awssdk=WARN

# HTTP client — set to DEBUG for REST catalog troubleshooting
io.trino.plugin.iceberg.catalog.rest=INFO
