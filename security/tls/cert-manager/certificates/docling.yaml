##
## cert-manager Certificate — Docling (Document Ingestion API)
## ADR-006: 90-day lifetime, autorenew at 30 days remaining.
##
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: docling-tls
  namespace: lakehouse-ingest
spec:
  secretName: docling-tls
  duration:    2160h
  renewBefore: 720h
  commonName:  docling.lakehouse-ingest.svc.cluster.local
  subject:
    organizations: [OpenLakehouse]
  dnsNames:
    - docling
    - docling-api
    - docling.lakehouse-ingest
    - docling.lakehouse-ingest.svc.cluster.local
  usages:
    - server auth
    - client auth
  issuerRef:
    name:  openbao-issuer
    kind:  ClusterIssuer
    group: cert-manager.io
