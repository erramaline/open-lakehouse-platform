##
## cert-manager Certificate — Keycloak (Identity Provider)
## ADR-006: 90-day lifetime, autorenew at 30 days remaining.
##
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-tls
  namespace: lakehouse-system
spec:
  secretName: keycloak-tls
  duration:    2160h
  renewBefore: 720h
  commonName:  keycloak.lakehouse-system.svc.cluster.local
  subject:
    organizations: [OpenLakehouse]
  dnsNames:
    - keycloak
    - keycloak.lakehouse-system
    - keycloak.lakehouse-system.svc.cluster.local
    - auth.lakehouse.internal
  usages:
    - server auth
    - client auth
  issuerRef:
    name:  openbao-issuer
    kind:  ClusterIssuer
    group: cert-manager.io
