##
## cert-manager Certificate — Project Nessie (Git-like catalog versioning)
## ADR-006: 90-day lifetime, autorenew at 30 days remaining.
##
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nessie-tls
  namespace: lakehouse-data
spec:
  secretName: nessie-tls
  duration:    2160h
  renewBefore: 720h
  commonName:  nessie.lakehouse-data.svc.cluster.local
  subject:
    organizations: [OpenLakehouse]
  dnsNames:
    - nessie
    - nessie.lakehouse-data
    - nessie.lakehouse-data.svc.cluster.local
  usages:
    - server auth
    - client auth
  issuerRef:
    name:  openbao-issuer
    kind:  ClusterIssuer
    group: cert-manager.io
