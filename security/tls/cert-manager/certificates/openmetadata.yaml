##
## cert-manager Certificate — OpenMetadata (Data Catalog & Lineage)
## ADR-006: 90-day lifetime, autorenew at 30 days remaining.
##
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openmetadata-tls
  namespace: lakehouse-ingest
spec:
  secretName: openmetadata-tls
  duration:    2160h
  renewBefore: 720h
  commonName:  openmetadata.lakehouse-ingest.svc.cluster.local
  subject:
    organizations: [OpenLakehouse]
  dnsNames:
    - openmetadata
    - openmetadata.lakehouse-ingest
    - openmetadata.lakehouse-ingest.svc.cluster.local
  usages:
    - server auth
    - client auth
  issuerRef:
    name:  openbao-issuer
    kind:  ClusterIssuer
    group: cert-manager.io
