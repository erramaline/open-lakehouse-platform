##
## cert-manager Certificate — OpenTelemetry Collector
## ADR-006: 90-day lifetime, autorenew at 30 days remaining.
##
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: otel-collector-tls
  namespace: lakehouse-obs
spec:
  secretName: otel-collector-tls
  duration:    2160h
  renewBefore: 720h
  commonName:  otel-collector.lakehouse-obs.svc.cluster.local
  subject:
    organizations: [OpenLakehouse]
  dnsNames:
    - otel-collector
    - otel-collector.lakehouse-obs
    - otel-collector.lakehouse-obs.svc.cluster.local
  usages:
    - server auth
    - client auth
  issuerRef:
    name:  openbao-issuer
    kind:  ClusterIssuer
    group: cert-manager.io
