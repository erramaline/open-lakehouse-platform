##
## cert-manager Certificate — Apache Polaris (Iceberg REST Catalog)
## ADR-006: 90-day lifetime, autorenew at 30 days remaining.
##
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: polaris-tls
  namespace: lakehouse-data
spec:
  secretName: polaris-tls
  duration:    2160h
  renewBefore: 720h
  commonName:  polaris.lakehouse-data.svc.cluster.local
  subject:
    organizations: [OpenLakehouse]
  dnsNames:
    - polaris
    - polaris.lakehouse-data
    - polaris.lakehouse-data.svc.cluster.local
  usages:
    - server auth
    - client auth
  issuerRef:
    name:  openbao-issuer
    kind:  ClusterIssuer
    group: cert-manager.io
