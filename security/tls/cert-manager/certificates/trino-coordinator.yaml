##
## cert-manager Certificate — Trino Coordinator
## ADR-006: 90-day lifetime, autorenew at 30 days remaining.
##
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: trino-coordinator-tls
  namespace: lakehouse-data
spec:
  secretName: trino-coordinator-tls
  duration:    2160h   # 90 days
  renewBefore: 720h    # 30 days before expiry (at 60 days remaining)
  commonName:  trino-coordinator.lakehouse-data.svc.cluster.local
  subject:
    organizations: [OpenLakehouse]
  dnsNames:
    - trino-coordinator
    - trino-coordinator.lakehouse-data
    - trino-coordinator.lakehouse-data.svc
    - trino-coordinator.lakehouse-data.svc.cluster.local
    - trino
    - trino.lakehouse-data.svc.cluster.local
  usages:
    - server auth
    - client auth
  issuerRef:
    name:  openbao-issuer
    kind:  ClusterIssuer
    group: cert-manager.io
